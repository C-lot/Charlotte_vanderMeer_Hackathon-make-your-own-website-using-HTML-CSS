<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script
      src="https://kit.fontawesome.com/f61c2aba86.js"
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5.15.3/css/fontawesome.min.css"
      integrity="sha384-wESLQ85D6gbsF459vf1CiZ2+rr+CsxRY0RpiF1tLlQpDnAgg6rwdsUF1+Ics2bni"
      crossorigin="anonymous"
    />
    <link href="https://fonts.googleapis.com/css?family=Karla" rel="styles" />
    <title>CP fotografie Contact</title>
    <link rel="stylesheet" type="text/css" href="styles.css" />
  </head>
  <body>
    <div class="container-site">
      <header class="header-site">
        <p>CP FOTOGRAFIE</p>
      </header>
      <nav class="navigation-site">
        <li><a class="nav" href="index.html">Home</a></li>
        <li><a class="nav" href="portfolio.html">Portfolio</a></li>
        <li><a class="nav" href="tarieven.html">Tarieven</a></li>
        <li><a class="nav" href="contact.html">Contact</a></li>
      </nav>
      <main class="box1">
        <img
          class="profielfoto"
          src="Foto's/12.jpeg"
          alt="CP fototgrafie profielfoto"
        />
      </main>
      <sideblock class="box2">
        <h3>Contact opnemen?</h3>
        <p>
          Vul het onderstaande formulier in of stuur een email.<br />Er wordt
          binnen 48 uur contact met u opgenomen.
        </p>
        <br />
        <form class="form" name="Form" method="Post" data-netlify="true">
          <p>
            <label>Uw naam: <input type="text" name="name" /></label>
          </p>
          <p>
            <label>Uw email: <input type="email" name="email" /></label>
          </p>
          <p>
            <label>Onderwerp: <textarea name="onderwerp"></textarea></label>
          </p>
          <p>
            <label>Uw bericht: <textarea name="Bericht"></textarea></label>
          </p>
          <button type="submit">Verzenden</button>
        </form>
      </sideblock>
      <footer class="footer-site">
        <p class="copyright">© CP FOTOGRAFIE</p>
        <ul class="container-socialmedia">
          <li>
            <a
              class="socialmedia"
              href="https://www.facebook.com/zwangerschapsfotografieutrecht/"
              ><i class="fa fa-facebook" aria-hidden="true"></i
            ></a>
          </li>
          <li>
            <a class="socialmedia" href="#"
              ><i class="fa fa-instagram" aria-hidden="true"></i
            ></a>
          </li>
        </ul>
      </footer>
    </div>
  </body>
</html>
